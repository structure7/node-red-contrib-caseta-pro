name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: lint & test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # engines.node is >=18; cover the floor plus current LTS lines.
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      # No package-lock.json is committed (library with dev-only deps), so use
      # `npm install` rather than `npm ci`.
      - run: npm install --no-audit --no-fund

      - run: npm run lint

      - run: npm test
